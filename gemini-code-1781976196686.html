<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Chat Guide Bot Assistant | Royal Rajasthan Tourism</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container section-padding">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow border-0 bg-white">
                    <div class="card-header bg-dark text-white p-3" style="background-color: #5c0612 !important;">
                        <h5 class="mb-0 text-warning royal-font">AI Guide Bot Console</h5>
                    </div>
                    <div class="card-body bg-light overflow-auto" id="chatMessagesBox" style="height: 350px;">
                        <div class="text-start mb-2"><span class="p-2 d-inline-block text-white rounded" style="background-color: #5c0612;">Khamma Ghani! Ask me about 'Jaipur', 'Temples', or 'Budget'.</span></div>
                    </div>
                    <div class="card-footer bg-white p-3">
                        <div class="input-group">
                            <input type="text" id="chatInput" class="form-control" placeholder="Type your message here...">
                            <button class="btn btn-royal text-white" type="button" onclick="sendChatMessage()">Send</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
