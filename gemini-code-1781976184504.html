<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register Credentials | Royal Rajasthan Tourism</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container section-padding">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow p-4 border-0 bg-white">
                    <h2 class="royal-font text-maroon text-center mb-4">Create Traveller Account</h2>
                    <form action="login.html" method="GET">
                        <div class="mb-3"><label class="form-label">First Name</label><input type="text" class="form-control" required></div>
                        <div class="mb-3"><label class="form-label">Email Address</label><input type="email" class="form-control" required></div>
                        <div class="mb-3"><label class="form-label">Password</label><input type="password" class="form-control" required></div>
                        <button type="submit" class="btn btn-royal w-100 text-white">Register Account</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
