<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Budget Utility Cost Calculator | Royal Rajasthan Tourism</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container section-padding">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow border-0 p-4 bg-white">
                    <h2 class="royal-font text-maroon text-center mb-4">Budget Assessment Calculator</h2>
                    <div class="mb-3">
                        <label class="form-label">Total Trip Duration (Days)</label>
                        <input type="number" id="travelDays" class="form-control" value="4">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Accommodation Tier</label>
                        <select id="travelStyle" class="form-select">
                            <option value="budget">Standard Heritage (Economy)</option>
                            <option value="mid" selected>Premium Boutique Hotels</option>
                            <option value="luxury">Ultra Luxury Grand Palaces</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Number of Co-Travellers</label>
                        <input type="number" id="travelersCount" class="form-control" value="2">
                    </div>
                    <button class="btn btn-royal w-100 text-white py-2" id="calcBudgetBtn">Run Cost Analysis</button>
                    <div id="budgetResult" class="mt-4"></div>
                </div>
            </div>
        </div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
