<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Traveller Sign In | Royal Rajasthan Tourism</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container section-padding">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow p-4 border-0 bg-white">
                    <div class="text-center mb-4">
                        <h2 class="royal-font text-maroon">Heritage Portal Sign In</h2>
                    </div>
                    <form action="dashboard.html" method="GET">
                        <div class="mb-3">
                            <label class="form-label">Registered Email</label>
                            <input type="email" class="form-control" value="guest@royalrajasthan.com" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Secure Access Key</label>
                            <input type="password" class="form-control" value="password123" required>
                        </div>
                        <button type="submit" class="btn btn-royal w-100 text-white">Authorize Session</button>
                    </form>
                    <div class="text-center mt-3 small"><a href="register.html" class="text-maroon">Request Registration</a></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
