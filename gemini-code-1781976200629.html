<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Traveller Profile Dashboard | Royal Rajasthan Tourism</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container section-padding">
        <div class="p-4 rounded-3 text-white shadow mb-4" style="background: linear-gradient(135deg, #5c0612, #3b020a);">
            <h1 class="royal-font">Welcome back, Royal Guest!</h1>
            <p class="mb-0 text-white-50">Track your custom saved itineraries, weather alerts, and profile vectors live.</p>
        </div>
        <div class="row g-4 text-center">
            <div class="col-md-4"><div class="card border-0 p-4 shadow-sm bg-white"><h4>1 Active Route</h4><small class="text-muted">Jaipur - Sikar Circuit</small></div></div>
            <div class="col-md-4"><div class="card border-0 p-4 shadow-sm bg-white"><h4>2 Hotel Vouchers</h4><small class="text-muted">Heritage Booking Confirmed</small></div></div>
            <div class="col-md-4"><div class="card border-0 p-4 shadow-sm bg-white"><h4>₹24,500 Saved</h4><small class="text-muted">Estimated Itinerary Cost</small></div></div>
        </div>
    </div>
</body>
</html>
